services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      # --- Entrypoints ---
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Note: This line isn't strictly needed if you define TLS in labels,
      # but it doesn't hurt.
      - "--entryPoints.websecure.http.tls=true"

      # --- Docker Provider ---
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # --- SSL / Let's Encrypt ---
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=rabee.hostinger@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letscrypt/acme.json"

      # --- API & Dashboard ---
      - "--api.dashboard=true"
      - "--api.insecure=false" # Set to false for production security
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Optional: Keep only if you need local access
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letscrypt:/letscrypt"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"

      # 1. Routing Rule: Match the domain AND the /traefik path (or the internal /api)
      - "traefik.http.routers.traefik-dash.rule=Host(`honeybunny.online`) && (PathPrefix(`/traefik`) || PathPrefix(`/api`))"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.tls.certresolver=myresolver"

      # 2. Middleware: Strip the "/traefik" prefix before sending to the internal dashboard
      - "traefik.http.routers.traefik-dash.middlewares=traefik-strip"
      - "traefik.http.middlewares.traefik-strip.stripprefix.prefixes=/traefik"

      # 3. Optional but HIGHLY recommended: Add Basic Auth (Don't leave your dashboard open!)
      # Replace 'user:hashed_password' with a real one
      # - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$apr1$$..."
      # - "traefik.http.routers.traefik-dash.middlewares=traefik-strip,traefik-auth"

networks:
  traefik-public:
    external: true
